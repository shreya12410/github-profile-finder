<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Profile Finder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div>
        <h1 id="heading">GITHUB <span id="blue">PROFILE </span> FINDER</h1>
    </div>
    <div>
        <p id="text">Search any developer's profile instantly</p>
    </div>
    <div id="head">
        <div>
            <input type="text" placeholder="Enter username" id="user">
        </div>
        <div>
            <button id="btn">Search</button>
        </div>
    </div>
    <div id="content">

        <div>
            <div id="bg">
                <img src="images.png" id="avatar">
            </div>


            <div class="item">
                <h2>Linus Torvalds</h2>
            </div>
            <div class="item2">

                <a href="@torvalds" class="link">@torvalds</a>
            </div>
            <div class="item3">
                <p class="item4">Creator of git. Nothing more to be said.</p>
            </div>
        </div>
        <div id="cards">
            <div class="one">
                <h3 class="num1">239</h3>
                <p class="element">REPOS</p>
            </div>
            <div class="one">
                <h3 class="num2">243K</h3>
                <p class="element">FOLLOWERS</p>
            </div>
            <div class="one">
                <h3 class="num3">0</h3>
                <p class="element">FOLLOWING</p>
            </div>
        </div>
        <div id="info">
            <div class="two">
                <p><span class="circle">●</span><span class="place">Helsinki,Finland</span></p>
            </div>
            <div class="two2">
                <p><span class="circle">●</span><span class="comp">Linux Foundation</span></p>
            </div>
            <div class="two3">
                <p><span class="circle">●</span><span class="date">Joined 2011</span></p>
            </div>
        </div>


    </div>

    <script src="script.js"></script>
</body>

</html>
